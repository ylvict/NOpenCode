name: CodeQL

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  schedule:
    - cron: "0 0 * * 0"

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - uses: github/codeql-action/init@v3
        with:
          languages: csharp

      - run: dotnet build src/NOpenCode/NOpenCode.csproj --configuration Release

      - uses: github/codeql-action/analyze@v3
