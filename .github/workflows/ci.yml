name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - run: dotnet build --configuration Release

      - run: dotnet test tests/NOpenCode.Tests/NOpenCode.Tests.csproj --configuration Release --no-build
